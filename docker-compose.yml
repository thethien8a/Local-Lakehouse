# Khai báo cấu hình chung cho Spark để đỡ phải viết lại nhiều lần
x-spark-common: &spark-common
  image: bitnamilegacy/spark:3.5.1
  user: root 
  volumes:
    - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    - ./conf/log4j2.properties:/opt/bitnami/spark/conf/log4j2.properties
    - ./jars:/opt/bitnami/spark/custom-jars
    - spark-events:/opt/bitnami/spark/events 
    - ./data:/opt/bitnami/spark/data
    - ./src:/opt/bitnami/spark/src
services:
  # 1. MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # Cổng API
      - "9001:9001" # Cổng UI
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # 1b. Tự tạo bucket "warehouse" khi MinIO sẵn sàng
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 admin password; do sleep 1; done;
      mc mb --ignore-existing local/warehouse;
      echo 'Bucket warehouse created';
      "

  # 2. Project Nessie
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    user: root
    ports:
      - "19120:19120" # Cổng để Spark và các engine khác giao tiếp
    environment:
      - QUARKUS_HTTP_PORT=19120
      - NESSIE_VERSION_STORE_TYPE=ROCKSDB
      - NESSIE_VERSION_STORE_PERSIST_ROCKS_DATABASE_PATH=/nessie/data
      # Cấu hình Iceberg REST catalog — bắt buộc để Trino dùng REST endpoint
      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=warehouse
      - NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION=s3://warehouse/
      # Cấu hình S3/MinIO cho Nessie Iceberg REST
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT=http://minio:9000
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION=us-east-1
      # Access key dùng cơ chế URN secret của Nessie (Quarkus SmallRye Config)
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY=urn:nessie-secret:quarkus:s3creds
      - S3CREDS_NAME=admin
      - S3CREDS_SECRET=password
    volumes:
      - nessie-data:/nessie/data

  # 3. Trino (SQL Query Engine - đọc/phân tích dữ liệu từ Iceberg tables)
  trino:
    image: trinodb/trino:443
    container_name: trino
    ports:
      - "8083:8080" # Cổng UI + SQL endpoint
    volumes:
      - ./conf/trino/catalog:/etc/trino/catalog # Mount catalog config
    depends_on:
      - minio
      - nessie

  # 3b. Metabase (BI Dashboard - trực quan hoá dữ liệu từ Trino)
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000" # Cổng UI
    environment:
      - MB_JETTY_PORT=3000
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      - trino

  # 4. Spark Master
  spark-master:
    <<: *spark-common
    container_name: spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "8082:8080" # Cổng để xem giao diện quản lý của Master
      - "7077:7077" # Cổng để các worker và Airflow báo cáo cho Master

  # 5. Spark Worker
  spark-worker:
    <<: *spark-common
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077 # Địa chỉ của master
      - SPARK_WORKER_MEMORY=2G # Cấp cho worker 2GB RAM 
      - SPARK_WORKER_CORES=2   # Cấp cho worker 2 nhân CPU
    ports:
      - "8081:8081" # Giao diện của worker
    depends_on:
      - spark-master

  # 6. PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 7. Airflow Init
  airflow-init:
    build: ./docker/airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=airflow 
      - _AIRFLOW_WWW_USER_PASSWORD=airflow123
    command: airflow db init

  # 8. Airflow Webserver
  airflow-webserver:
    build: ./docker/airflow
    container_name: airflow-webserver
    depends_on:
      - postgres
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
    ports:
      - "8080:8080" 
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags 
      - ./src/airflow/logs:/opt/airflow/logs
      - spark-events:/opt/airflow/spark-events
    command: webserver

  # 9. Airflow Scheduler (chạy spark-submit → cần Spark config, jars, source code)
  airflow-scheduler:
    build: ./docker/airflow
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
      - PYTHONPATH=/opt/bitnami/spark
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
      - spark-events:/opt/airflow/spark-events
      - ./src:/opt/bitnami/spark/src
      - ./data:/opt/bitnami/spark/data
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/log4j2.properties:/opt/spark/conf/log4j2.properties
      - ./jars:/opt/bitnami/spark/custom-jars
    command: scheduler

volumes:
  minio-data:
  nessie-data: # Lưu metadata catalog (RocksDB) để bảng không bị mất khi restart
  postgres-data: # Lưu dữ liệu lịch sử của Airflow
  metabase-data: # Lưu cấu hình Metabase (H2 embedded DB)
  spark-events: # Lưu dữ liệu spark