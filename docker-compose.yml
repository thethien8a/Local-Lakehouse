version: '3.8'

# Khai báo cấu hình chung cho Spark để đỡ phải viết lại nhiều lần
x-spark-common: &spark-common
  image: bitnami/spark:3.5
  user: root 
  volumes:
    - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    - spark-events:/opt/bitnami/spark/events 
    - ./data:/opt/bitnami/spark/data 

services:
  # 1. Lớp Lưu trữ Đối tượng (MinIO - Đóng vai trò như AWS S3 cục bộ)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # Cổng API
      - "9001:9001" # Cổng UI
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # 2. Lớp Catalog & Quản lý Phiên bản (Project Nessie - Giống như Git cho Data)
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    ports:
      - "19120:19120" # Cổng để Spark và các engine khác giao tiếp
    environment:
      - QUARKUS_HTTP_PORT=19120

  # 3. Quản đốc phân công công việc (Spark Master)
  spark-master:
    <<: *spark-common # Lấy tất cả cấu hình dùng chung ở trên xuống đây
    container_name: spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "8082:8080" # Cổng để xem giao diện quản lý của Master
      - "7077:7077" # Cổng để các worker và Airflow báo cáo cho Master

  # 4. Công nhân trực tiếp xử lý dữ liệu (Spark Worker)
  spark-worker:
    <<: *spark-common
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077 # Địa chỉ của master
      - SPARK_WORKER_MEMORY=2G # Cấp cho worker 2GB RAM 
      - SPARK_WORKER_CORES=2   # Cấp cho worker 2 nhân CPU
    ports:
      - "8081:8081" # Giao diện của worker
    depends_on:
      - spark-master

volumes:
  minio-data:
  spark-events: # Khai báo thêm volume này để lưu log của Spark