# Khai báo cấu hình chung cho Spark để đỡ phải viết lại nhiều lần
x-spark-common: &spark-common
  build: ./docker/spark
  user: root 
  volumes:
    - ./conf/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf.tpl:ro
    - ./conf/log4j2.properties:/opt/bitnami/spark/conf/log4j2.properties
    - ./conf/metrics.properties:/opt/bitnami/spark/conf/metrics.properties:ro
    - ./jars:/opt/bitnami/spark/custom-jars
    - spark-events:/opt/bitnami/spark/events 
    - ./data:/opt/bitnami/spark/data
    - ./src:/opt/bitnami/spark/src
    # JMX Exporter config cho Prometheus monitoring
    - ./conf/jmx-exporter/spark.yml:/opt/bitnami/spark/jmx-exporter.yml:ro
  environment:
    - MINIO_ROOT_USER=${MINIO_ROOT_USER}
    - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    
services:
  # 1. MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # Cổng API
      - "9001:9001" # Cổng UI
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # 1b. Tự tạo bucket "warehouse" + generate Prometheus bearer token
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    volumes:
      - minio-prometheus-token:/token
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/warehouse;
      echo 'Bucket warehouse created';
      mc admin prometheus generate local cluster | while IFS=: read key val; do case $$key in *bearer_token) echo $$val | tr -d ' ' > /token/minio-token; break;; esac; done;
      echo 'Prometheus bearer token generated';
      "

  # 2. Project Nessie
  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.4
    container_name: nessie
    user: root
    ports:
      - "19120:19120" # Cổng để Spark và các engine khác giao tiếp
    environment:
      - QUARKUS_HTTP_PORT=19120
      - NESSIE_VERSION_STORE_TYPE=ROCKSDB
      - NESSIE_VERSION_STORE_PERSIST_ROCKS_DATABASE_PATH=/nessie/data
      # Cấu hình Iceberg REST catalog — bắt buộc để Trino dùng REST endpoint
      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=warehouse
      - NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION=s3://warehouse/
      # Cấu hình S3/MinIO cho Nessie Iceberg REST
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT=http://minio:9000
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION=us-east-1
      # Access key dùng cơ chế URN secret của Nessie (Quarkus SmallRye Config)
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY=urn:nessie-secret:quarkus:s3creds
      - S3CREDS_NAME=${MINIO_ROOT_USER}
      - S3CREDS_SECRET=${MINIO_ROOT_PASSWORD}
    volumes:
      - nessie-data:/nessie/data

  # 3. Trino (SQL Query Engine - đọc/phân tích dữ liệu từ Iceberg tables)
  trino:
    build: ./docker/trino
    container_name: trino
    ports:
      - "8083:8080" # Cổng UI + SQL endpoint
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./conf/trino/catalog/nessie.properties:/etc/trino/catalog/nessie.properties.tpl:ro
    entrypoint: >
      /bin/sh -c "
      envsubst < /etc/trino/catalog/nessie.properties.tpl > /etc/trino/catalog/nessie.properties &&
      /usr/lib/trino/bin/run-trino
      "
    depends_on:
      - minio
      - nessie

  # 3b. Metabase (BI Dashboard - trực quan hoá dữ liệu từ Trino)
  metabase:
    image: metabase/metabase:v0.58.11
    container_name: metabase
    ports:
      - "3000:3000" # Cổng UI
    environment:
      - MB_JETTY_PORT=3000
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      - trino

  # 4. Spark Master (có SSH server để Airflow remote submit)
  spark-master:
    <<: *spark-common
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - SPARK_SSH_PASSWORD=${SPARK_SSH_PASSWORD}
      # JMX Exporter agent cho Prometheus monitoring
      - SPARK_MASTER_OPTS=-javaagent:/opt/bitnami/spark/custom-jars/jmx_prometheus_javaagent-1.0.1.jar=9091:/opt/bitnami/spark/jmx-exporter.yml
    ports:
      - "8082:8080" # Cổng để xem giao diện quản lý của Master
      - "7077:7077" # Cổng để các worker và Airflow báo cáo cho Master
      - "9091:9091" # Prometheus JMX metrics (Master)
      - "9092:9092" # Prometheus JMX metrics (Driver - chỉ khi spark-submit đang chạy)
      - "4040:4040" # Spark Driver UI + Prometheus executor metrics endpoint
    command: >
      bash -c "
      echo \"root:$$SPARK_SSH_PASSWORD\" | chpasswd &&
      envsubst < /opt/bitnami/spark/conf/spark-defaults.conf.tpl > /opt/bitnami/spark/conf/spark-defaults.conf &&
      /usr/sbin/sshd &&
      /opt/bitnami/scripts/spark/run.sh
      "

  # 5. Spark Worker
  spark-worker:
    <<: *spark-common
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077 # Địa chỉ của master
      - SPARK_WORKER_MEMORY=2G # Cấp cho worker 2GB RAM 
      - SPARK_WORKER_CORES=2   # Cấp cho worker 2 nhân CPU
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      # JMX Exporter agent cho Prometheus monitoring
      - SPARK_WORKER_OPTS=-javaagent:/opt/bitnami/spark/custom-jars/jmx_prometheus_javaagent-1.0.1.jar=9091:/opt/bitnami/spark/jmx-exporter.yml
    ports:
      - "8081:8081" # Giao diện của worker
      - "9093:9091" # Prometheus JMX metrics (port khác để tránh conflict)
    command: >
      bash -c "
      envsubst < /opt/bitnami/spark/conf/spark-defaults.conf.tpl > /opt/bitnami/spark/conf/spark-defaults.conf &&
      /opt/bitnami/scripts/spark/run.sh
      "
    depends_on:
      - spark-master

  # 6. PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # 7. Airflow Init
  airflow-init:
    build: ./docker/airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_WWW_USER}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_WWW_PASSWORD}
    command: airflow db init

  # 8. Airflow Webserver
  airflow-webserver:
    build: ./docker/airflow
    container_name: airflow-webserver
    depends_on:
      - postgres
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080" 
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags 
      - ./src/airflow/logs:/opt/airflow/logs
    command: webserver

  # 9. Airflow Scheduler (SSH vào spark-master để chạy spark-submit)
  airflow-scheduler:
    build: ./docker/airflow
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - airflow-init
      - spark-master
      - statsd-exporter
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_SPARK_SSH=ssh://root:${SPARK_SSH_PASSWORD}@spark-master:22
      # StatsD metrics cho Prometheus monitoring
      - AIRFLOW__METRICS__STATSD_ON=True
      - AIRFLOW__METRICS__STATSD_HOST=statsd-exporter
      - AIRFLOW__METRICS__STATSD_PORT=9125
      - AIRFLOW__METRICS__STATSD_PREFIX=airflow
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
      - ./src/airflow/logs:/opt/airflow/logs
    command: scheduler

  # 10. Prometheus - Time series database cho metrics
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./conf/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./conf/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
      - minio-prometheus-token:/etc/prometheus/minio-token:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.size=10GB'
      - '--query.timeout=3m'
    restart: unless-stopped
    depends_on:
      - minio-init
      - postgres-exporter
      - statsd-exporter

  # 11. PostgreSQL Exporter - Export PostgreSQL metrics cho Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow?sslmode=disable
    restart: unless-stopped
    depends_on:
      - postgres

  # 12. StatsD Exporter - Chuyển đổi Airflow StatsD metrics sang Prometheus format
  statsd-exporter:
    image: prom/statsd-exporter:v0.28.0
    container_name: statsd-exporter
    ports:
      - "9102:9102"    # Prometheus metrics endpoint
      - "9125:9125/udp" # StatsD input từ Airflow
    volumes:
      - ./conf/statsd/mapping.yml:/tmp/mapping.yml:ro
    command:
      - '--statsd.mapping-config=/tmp/mapping.yml'
      - '--statsd.listen-udp=:9125'
      - '--web.listen-address=:9102'
    restart: unless-stopped

  # 13. Grafana - Visualization Dashboard cho Prometheus metrics
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3001:3000"  # Port 3001 vì Metabase đã dùng 3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-password}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./conf/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  minio-data:
  nessie-data: # Lưu metadata catalog (RocksDB) để bảng không bị mất khi restart
  postgres-data: # Lưu dữ liệu lịch sử của Airflow
  metabase-data: # Lưu cấu hình Metabase (H2 embedded DB)
  spark-events: # Lưu log lịch sử chạy Spark (Spark History Server)
  prometheus-data: # Lưu time series data của Prometheus
  minio-prometheus-token: # Chứa bearer token để Prometheus scrape MinIO metrics
  grafana-data: # Lưu dashboards, users, settings của Grafana