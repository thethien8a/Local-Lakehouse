# Kết nối Trino với Iceberg tables thông qua Nessie catalog
# File tên "nessie.properties" → catalog name trong Trino sẽ là "nessie" (trùng với Spark)
connector.name=iceberg

# Sử dụng Nessie làm catalog cho Iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v1
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://warehouse/

# Kết nối tới MinIO (S3-compatible)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=admin
s3.aws-secret-key=password
s3.path-style-access=true
s3.region=us-east-1