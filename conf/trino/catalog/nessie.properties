# Kết nối Trino với Iceberg tables thông qua Nessie REST catalog
# Dùng REST catalog thay vì nessie catalog type để tương thích Nessie 0.107.3+
connector.name=iceberg

# Sử dụng Iceberg REST protocol — Nessie expose endpoint /iceberg/main
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://nessie:19120/iceberg/main
iceberg.rest-catalog.warehouse=warehouse

# Kết nối tới MinIO (S3-compatible)
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=admin
s3.aws-secret-key=password
s3.path-style-access=true
s3.region=us-east-1