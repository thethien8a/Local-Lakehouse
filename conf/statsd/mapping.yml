# StatsD Exporter mapping cho Apache Airflow
defaults:
  # Drop metric không match rule nào — tránh 500 do type conflict
  match_type: glob
  glob_disable_ordering: false
  ttl: 0s

mappings:
  # DAG Run Duration
  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_success_seconds"
    labels:
      dag_id: "$1"
    help: "DAG run duration when successful"

  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_failed_seconds"
    labels:
      dag_id: "$1"
    help: "DAG run duration when failed"

  # DAG Processing
  - match: "airflow.dag_processing.total_parse_time"
    name: "airflow_dag_processing_total_parse_time_seconds"
    help: "Total time to parse all DAG files"

  - match: "airflow.dagbag_size"
    name: "airflow_dagbag_size"
    help: "Number of DAGs in the DagBag"

  - match: "airflow.dag_processing.processes"
    name: "airflow_dag_processing_processes"
    help: "Number of DAG processing processes"

  - match: "airflow.dag_processing.import_errors"
    name: "airflow_dag_processing_import_errors"
    help: "Number of import errors during DAG processing"

  - match: "airflow.dag_processing.file_path_queue_size"
    name: "airflow_dag_processing_file_path_queue_size"
    help: "DAG file path queue size"

  - match: "airflow.dag_processing.file_path_queue_update_count"
    name: "airflow_dag_processing_file_path_queue_update_count_total"
    help: "DAG file path queue update count"

  # Task Instance metrics
  - match: "airflow.ti.start.*.*"
    name: "airflow_ti_start_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
    help: "Task instance start count"

  - match: "airflow.ti.finish.*.*.*"
    name: "airflow_ti_finish_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
      state: "$3"
    help: "Task instance finish count by state"

  - match: "airflow.ti_failures"
    name: "airflow_ti_failures_total"
    help: "Total task instance failures"

  - match: "airflow.ti_successes"
    name: "airflow_ti_successes_total"
    help: "Total task instance successes"

  # Scheduler metrics

  - match: "airflow.scheduler.tasks.starving"
    name: "airflow_scheduler_tasks_starving"
    help: "Number of starving tasks"

  - match: "airflow.scheduler.tasks.executable"
    name: "airflow_scheduler_tasks_executable"
    help: "Number of executable tasks"

  - match: "airflow.scheduler_heartbeat"
    name: "airflow_scheduler_heartbeat_total"
    help: "Scheduler heartbeat count"

  - match: "airflow.scheduler.orphaned_tasks.cleared"
    name: "airflow_scheduler_orphaned_tasks_cleared_total"
    help: "Number of orphaned tasks cleared"

  - match: "airflow.scheduler.critical_section_duration"
    name: "airflow_scheduler_critical_section_duration_seconds"
    help: "Scheduler critical section duration"

  - match: "airflow.scheduler.critical_section_query_duration"
    name: "airflow_scheduler_critical_section_query_duration_seconds"
    help: "Scheduler critical section query duration"

  - match: "airflow.scheduler.scheduler_loop_duration"
    name: "airflow_scheduler_loop_duration_seconds"
    help: "Scheduler loop duration"

  # Executor metrics
  - match: "airflow.executor.open_slots"
    name: "airflow_executor_open_slots"
    help: "Number of open executor slots"

  - match: "airflow.executor.queued_tasks"
    name: "airflow_executor_queued_tasks"
    help: "Number of queued tasks"

  - match: "airflow.executor.running_tasks"
    name: "airflow_executor_running_tasks"
    help: "Number of running tasks"

  # Pool metrics (có pool name)
  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool: "$1"
    help: "Number of open slots in pool"

  - match: "airflow.pool.queued_slots.*"
    name: "airflow_pool_queued_slots"
    labels:
      pool: "$1"
    help: "Number of queued slots in pool"

  - match: "airflow.pool.running_slots.*"
    name: "airflow_pool_running_slots"
    labels:
      pool: "$1"
    help: "Number of running slots in pool"

  - match: "airflow.pool.deferred_slots.*"
    name: "airflow_pool_deferred_slots"
    labels:
      pool: "$1"
    help: "Number of deferred slots in pool"

  - match: "airflow.pool.scheduled_slots.*"
    name: "airflow_pool_scheduled_slots"
    labels:
      pool: "$1"
    help: "Number of scheduled slots in pool"

  # Pool metrics tổng (không có pool name) — Airflow 2.10 gửi cả 2 kiểu
  - match: "airflow.pool.open_slots"
    name: "airflow_pool_total_open_slots"
    help: "Total open slots across all pools"

  - match: "airflow.pool.queued_slots"
    name: "airflow_pool_total_queued_slots"
    help: "Total queued slots across all pools"

  - match: "airflow.pool.running_slots"
    name: "airflow_pool_total_running_slots"
    help: "Total running slots across all pools"

  - match: "airflow.pool.deferred_slots"
    name: "airflow_pool_total_deferred_slots"
    help: "Total deferred slots across all pools"

  - match: "airflow.pool.scheduled_slots"
    name: "airflow_pool_total_scheduled_slots"
    help: "Total scheduled slots across all pools"

  # Drop tất cả metric không match — tránh 500 Internal Server Error
  - match: "."
    match_type: regex
    action: drop
    name: "dropped"
