# JMX Exporter config cho Apache Spark
---
startDelaySeconds: 5
ssl: false
lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # JVM Memory metrics
  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>(\w+)'
    name: jvm_memory_heap_$1
    type: GAUGE
    help: "JVM Heap Memory $1"
    
  - pattern: 'java.lang<type=Memory><NonHeapMemoryUsage>(\w+)'
    name: jvm_memory_nonheap_$1
    type: GAUGE
    help: "JVM Non-Heap Memory $1"

  # Garbage Collection
  - pattern: 'java.lang<type=GarbageCollector, name=(.*)><>CollectionCount'
    name: jvm_gc_collection_count
    labels:
      gc: $1
    type: COUNTER
    help: "JVM GC Collection Count"

  - pattern: 'java.lang<type=GarbageCollector, name=(.*)><>CollectionTime'
    name: jvm_gc_collection_seconds_sum
    labels:
      gc: $1
    type: COUNTER
    help: "JVM GC Collection Time in milliseconds"
    valueFactor: 0.001

  # Threading
  - pattern: 'java.lang<type=Threading><>ThreadCount'
    name: jvm_threads_current
    type: GAUGE
    help: "Current thread count"

  - pattern: 'java.lang<type=Threading><>DaemonThreadCount'
    name: jvm_threads_daemon
    type: GAUGE
    help: "Daemon thread count"

  # Spark DAGScheduler
  - pattern: 'metrics<name=(.*)\.driver\.DAGScheduler\.(.*)><>Value'
    name: spark_dag_scheduler_$2
    labels:
      app: $1
    type: GAUGE
    help: "Spark DAGScheduler $2"

  # Spark Executor metrics
  - pattern: 'metrics<name=(.*)\.driver\.executor\.(.*)><>Value'
    name: spark_executor_$2
    labels:
      app: $1
    type: GAUGE
    help: "Spark Executor $2"

  # Spark BlockManager
  - pattern: 'metrics<name=(.*)\.driver\.BlockManager\.(.*)><>Value'
    name: spark_block_manager_$2
    labels:
      app: $1
    type: GAUGE
    help: "Spark BlockManager $2"

  # Spark Master metrics
  - pattern: 'metrics<name=master\.(.*)><>Value'
    name: spark_master_$1
    type: GAUGE
    help: "Spark Master $1"

  # Spark Worker metrics
  - pattern: 'metrics<name=worker\.(.*)><>Value'
    name: spark_worker_$1
    type: GAUGE
    help: "Spark Worker $1"

  # Spark Shuffle metrics
  - pattern: 'metrics<name=(.*)\.driver\.shuffleService\.(.*)><>Value'
    name: spark_shuffle_$2
    labels:
      app: $1
    type: GAUGE
    help: "Spark Shuffle Service $2"

  # Catch-all for remaining Spark metrics
  - pattern: 'metrics<name=(.*)><>Value'
    name: spark_$1
    type: GAUGE
