# ==========================================
# PHẦN 1: BẬT TÍNH NĂNG (EXTENSIONS)
# ==========================================
# Mặc định Spark chỉ biết SQL cơ bản. Dòng này "tiêm" thêm từ vựng SQL của Iceberg và Nessie 
# (Ví dụ: cho phép dùng lệnh CREATE BRANCH, MERGE BRANCH của Nessie)
spark.sql.extensions = org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# ==========================================
# PHẦN 2: CHỈ CHO SPARK CHỖ ĐỌC SỔ (NESSIE)
# ==========================================
# Đặt tên một cuốn sổ (catalog) là "nessie"
spark.sql.catalog.nessie = org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl = org.apache.iceberg.nessie.NessieCatalog
# Địa chỉ để gọi API của Nessie (nằm ở container có tên "nessie", cổng 19120)
spark.sql.catalog.nessie.uri = http://nessie:19120/api/v1
# Mặc định đọc nhánh chính (main)
spark.sql.catalog.nessie.ref = main
# Định nghĩa thư mục gốc trong MinIO mà catalog này sẽ ghi dữ liệu vào
spark.sql.catalog.nessie.warehouse = s3a://warehouse/
spark.sql.catalog.nessie.authentication.type = NONE

# ==========================================
# PHẦN 3: CÁCH NÓI CHUYỆN VỚI KHO (MINIO)
# ==========================================
# Spark sẽ dùng giao thức "s3a" (giả lập AWS S3) để nói chuyện với MinIO
spark.hadoop.fs.s3a.endpoint = http://minio:9000
spark.hadoop.fs.s3a.access.key = admin
spark.hadoop.fs.s3a.secret.key = password
# Cực kỳ quan trọng: MinIO cần kiểu path-style để đọc đúng tên bucket
spark.hadoop.fs.s3a.path.style.access = true
spark.hadoop.fs.s3a.impl = org.apache.hadoop.fs.s3a.S3AFileSystem
# Tắt bảo mật SSL vì chạy ở local không có chứng chỉ HTTPS
spark.hadoop.fs.s3a.connection.ssl.enabled = false

# ==========================================
# PHẦN 4: TẢI SÁCH GIÁO KHOA (FILE JAR)
# ==========================================
# Đây là các thư viện bắt buộc. Khi Spark vừa bật lên, nó sẽ tự động lên mạng tải 4 cục này về:
# 1. Thư viện Iceberg cho Spark 3.5
# 2. Thư viện Nessie cho Spark
# 3 + 4. Thư viện Hadoop-AWS để Spark biết cách dùng giao thức s3a
spark.jars.packages = org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.0,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.99.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
