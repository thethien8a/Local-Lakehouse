# Spark Metrics Configuration
# Bật JMX Sink để Spark đẩy internal metrics ra JMX MBeans
# JMX Exporter agent sẽ đọc các MBeans này và dịch sang Prometheus format

# Master metrics → JMX
master.source.jvm.class=org.apache.spark.metrics.source.JvmSource
master.sink.jmx.class=org.apache.spark.metrics.sink.JmxSink

# Worker metrics → JMX
worker.source.jvm.class=org.apache.spark.metrics.source.JvmSource
worker.sink.jmx.class=org.apache.spark.metrics.sink.JmxSink

# Driver metrics → JMX (khi chạy spark-submit)
driver.source.jvm.class=org.apache.spark.metrics.source.JvmSource
driver.sink.jmx.class=org.apache.spark.metrics.sink.JmxSink

# Executor metrics → JMX
executor.source.jvm.class=org.apache.spark.metrics.source.JvmSource
executor.sink.jmx.class=org.apache.spark.metrics.sink.JmxSink
