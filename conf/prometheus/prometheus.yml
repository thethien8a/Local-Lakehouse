# Prometheus configuration cho Lakehouse Stack
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'lakehouse'
    env: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Thêm AlertManager sau nếu cần

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # Spark Master (JMX Exporter)
  - job_name: 'spark-master'
    static_configs:
      - targets: ['spark-master:9091']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'spark-master'

  # Spark Driver (JMX Exporter - chỉ có metrics khi spark-submit đang chạy)
  - job_name: 'spark-driver'
    static_configs:
      - targets: ['spark-master:9092']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'spark-driver'

  # Spark Executor metrics via Driver UI (chỉ có khi spark-submit đang chạy)
  - job_name: 'spark-executor'
    metrics_path: /metrics/executors/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['spark-master:4040']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'spark-executor'

  # Spark Worker (JMX Exporter)
  - job_name: 'spark-worker'
    static_configs:
      - targets: ['spark-worker:9091']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'spark-worker'

  # Airflow (via StatsD Exporter)
  - job_name: 'airflow'
    static_configs:
      - targets: ['statsd-exporter:9102']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'airflow'

  # MinIO Metrics V3 — chia theo endpoint, mỗi job scrape 1 nhóm metrics

  # Cluster health: capacity (total/free), drives, nodes
  - job_name: 'minio-cluster-health'
    metrics_path: /minio/metrics/v3/cluster/health
    scheme: http
    bearer_token_file: /etc/prometheus/minio-token/minio-token
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # Bucket usage: size, object count per bucket
  - job_name: 'minio-bucket-usage'
    metrics_path: /minio/metrics/v3/cluster/usage/buckets
    scheme: http
    bearer_token_file: /etc/prometheus/minio-token/minio-token
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # API requests: request count, errors, latency (TTFB), traffic bytes
  - job_name: 'minio-api'
    metrics_path: /minio/metrics/v3/api/requests
    scheme: http
    bearer_token_file: /etc/prometheus/minio-token/minio-token
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # System process: uptime (start_time_seconds), memory, file descriptors
  - job_name: 'minio-system'
    metrics_path: /minio/metrics/v3/system/process
    scheme: http
    bearer_token_file: /etc/prometheus/minio-token/minio-token
    static_configs:
      - targets: ['minio:9000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'minio'

  # PostgreSQL (postgres_exporter)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres-airflow'
